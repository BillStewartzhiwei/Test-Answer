server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  application:
    name: dace-server
  datasource:
    url: jdbc:mysql://localhost:3306/dace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

dace:
  jwt:
    secret: change-me-to-a-long-random-secret-in-production
    expire-hours: 168
  wechat:
    app-id: replace-with-miniapp-appid
    app-secret: replace-with-miniapp-secret
